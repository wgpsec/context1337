# secret.example.yaml — DO NOT commit real tokens here.
#
# ONE secret serves both purposes:
#   1. imagePullSecrets  — lets Kubernetes pull the image from ghcr.io
#   2. rollout-watcher   — CronJob reads the PAT from this secret to call the ghcr manifest API
#
# Create the real secret with:
#   kubectl create secret docker-registry ghcr-secret \
#     --docker-server=ghcr.io \
#     --docker-username=<YOUR_GITHUB_USERNAME> \
#     --docker-password=<YOUR_GITHUB_PAT_read:packages> \
#     --docker-email=<ANY_EMAIL> \
#     -n <your-namespace>
#
# The PAT must have scope: read:packages
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <base64 of {"auths":{"ghcr.io":{"username":"USER","password":"PAT","auth":"base64(USER:PAT)"}}}>
