# secret.example.yaml — DO NOT commit real tokens here.
# Create the real secret manually:
#
#   kubectl create secret generic ghcr-readonly-token \
#     --from-literal=token=<YOUR_GITHUB_PAT_WITH_READ_PACKAGES> \
#     -n <namespace>
#
# The PAT must have scope: read:packages
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-readonly-token
  namespace: default   # change to your target namespace
type: Opaque
stringData:
  token: REPLACE_WITH_GITHUB_PAT
